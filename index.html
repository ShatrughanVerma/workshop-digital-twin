<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Workshop Digital Twin | Real-time Workstation Monitoring</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon">🏭</div>
                <div>
                    <h1>Workshop Digital Twin</h1>
                    <p class="tagline">Real-time Workstation Value Monitoring</p>
                </div>
            </div>
            <div class="header-controls">
                <div class="status-badge">
                    <span class="status-dot live"></span>
                    <span>Live Data</span>
                </div>
                <div class="refresh-control">
                    <button id="refreshBtn" class="btn-icon" title="Manual Refresh">
                        🔄
                    </button>
                    <span id="lastUpdated" class="last-updated">Updating...</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="dashboard-main">
        <div id="dashboardContainer" class="dashboard-container">
            <!-- Dynamic content will be injected here -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Initializing digital twin...</p>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
